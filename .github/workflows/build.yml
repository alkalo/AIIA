name: Build AIIA

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app (Windows MSI)
        run: npm run tauri:build
        env:
          CI: true

      - name: List bundle output
        run: Get-ChildItem -Recurse target/release/bundle -ErrorAction SilentlyContinue

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: target/release/bundle/msi/*.msi
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app (macOS DMG)
        run: npm run tauri:build
        env:
          CI: true

      - name: List bundle output
        run: ls -laR target/release/bundle || true

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release files
        run: find artifacts -type f

      - name: Generate release manifest
        run: |
          python3 << 'PY'
          import hashlib, json, os, re
          from pathlib import Path

          artifacts = {}
          for path in Path("artifacts").rglob("*"):
              if not path.is_file():
                  continue
              name = path.name.lower()
              kind = None
              if name.endswith(".msi") and "aiia" in name:
                  kind = "msi"
              elif name.endswith(".dmg") and "aiia" in name:
                  kind = "dmg"
              if not kind:
                  continue
              sha = hashlib.sha256(path.read_bytes()).hexdigest()
              artifacts[kind] = {
                  "file": path.name,
                  "sha256": sha,
                  "url": f"https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/{path.name}",
              }

          manifest = {"version": "${{ github.ref_name }}".lstrip("v"), "assets": artifacts}
          Path("release-manifest.json").write_text(json.dumps(manifest, indent=2))
          print(json.dumps(manifest, indent=2))
          PY

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**
            release-manifest.json
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
